<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bg- Color-Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Bg-color-changer</h2>

    <section class="buttonCollection">

        <button class="redBtn">red</button>
        <button class="blueBtn">blue</button>
        <button class="greenBtn">green</button>
        <button class="resetBtn">reset</button>
    </section>
    <section class="custom">
        <h3>Create Custom Button</h3>
        <input type="text" name="btn" id="inputField" placeholder="Enter your button name">
        <button id="createButton">Create Button</button>
    </section>

<script src="script.js"></script>
</body>
</html>
